<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">College of Education Logo</title>
  <desc id="desc">A rose and gold College of Education emblem for the portfolio website.</desc>
  <defs>
    <linearGradient id="ring" x1="28" y1="28" x2="228" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8a0bf"/>
      <stop offset="0.52" stop-color="#f3c38f"/>
      <stop offset="1" stop-color="#d4af37"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="42%" r="68%">
      <stop offset="0" stop-color="#fff7fb"/>
      <stop offset="0.58" stop-color="#f6d8e6"/>
      <stop offset="1" stop-color="#d88caf"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1a1016" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="256" height="256" rx="64" fill="#1a1016"/>
  <circle cx="128" cy="128" r="103" fill="url(#ring)" filter="url(#softShadow)"/>
  <circle cx="128" cy="128" r="88" fill="url(#core)"/>
  <circle cx="128" cy="128" r="78" fill="none" stroke="#1a1016" stroke-opacity="0.2" stroke-width="3"/>

  <path d="M128 52c15 18 35 25 58 27-2 43-20 77-58 101-38-24-56-58-58-101 23-2 43-9 58-27Z" fill="#ffffff" opacity="0.58"/>
  <path d="M88 93h80v14H88zM88 119h80v14H88zM88 145h58v14H88z" fill="#6f3f55" opacity="0.65"/>
  <path d="M78 180c23 12 77 12 100 0" fill="none" stroke="#6f3f55" stroke-width="7" stroke-linecap="round" opacity="0.72"/>

  <text x="128" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="900" letter-spacing="3" fill="#1a1016">COE</text>
  <text x="128" y="160" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="2.2" fill="#6f3f55">BTLE · IA</text>
  <text x="128" y="210" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="2" fill="#fce4ec">COLLEGE OF EDUCATION</text>
</svg>
